<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time Clock</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0f;
    --surface: #18181c;
    --surface2: #222228;
    --border: #2e2e38;
    --accent: #e8ff47;
    --accent-dim: rgba(232,255,71,0.12);
    --text: #f0f0f0;
    --muted: #888;
    --danger: #ff5e5e;
    --success: #47ff9c;
    --warn: #ffb347;
  }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(232,255,71,0.06) 0%, transparent 60%);
    pointer-events: none;
  }

  .clock-wrap {
    width: 100%;
    max-width: 460px;
    position: relative;
    z-index: 1;
  }

  .brand {
    text-align: center;
    margin-bottom: 40px;
  }

  .brand h1 {
    font-family: 'Syne', sans-serif;
    font-size: 2.2rem;
    font-weight: 800;
    letter-spacing: -1px;
    color: var(--accent);
  }

  .live-time {
    font-size: 0.85rem;
    color: var(--muted);
    margin-top: 6px;
    letter-spacing: 0.05em;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 36px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.4;
  }

  .label {
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .code-input-wrap {
    position: relative;
  }

  .code-input {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 1.5rem;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.2em;
    text-align: center;
    text-transform: uppercase;
    outline: none;
    transition: border-color 0.2s;
  }

  .code-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }

  .code-input::placeholder { color: var(--border); letter-spacing: 0.1em; }

  .btn {
    width: 100%;
    margin-top: 16px;
    padding: 16px;
    border-radius: 10px;
    border: none;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: all 0.15s;
  }

  .btn-lookup {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    color: var(--text);
  }

  .btn-lookup:hover { border-color: var(--accent); color: var(--accent); }

  .btn-punch {
    background: var(--accent);
    color: #0d0d0f;
    display: none;
  }

  .btn-punch:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .btn-punch:active { transform: translateY(0); }

  .employee-info {
    display: none;
    margin: 20px 0 4px;
  }

  .emp-name {
    font-family: 'Syne', sans-serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--text);
  }

  .emp-status {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 4px;
  }

  .status-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-top: 8px;
  }

  .badge-in { background: rgba(71,255,156,0.15); color: var(--success); border: 1px solid rgba(71,255,156,0.3); }
  .badge-lunch { background: rgba(255,179,71,0.15); color: var(--warn); border: 1px solid rgba(255,179,71,0.3); }
  .badge-out { background: rgba(136,136,136,0.1); color: var(--muted); border: 1px solid var(--border); }
  .badge-done { background: rgba(71,255,156,0.15); color: var(--success); border: 1px solid rgba(71,255,156,0.3); }

  .result-msg {
    display: none;
    margin-top: 20px;
    padding: 14px 18px;
    border-radius: 10px;
    font-size: 0.9rem;
    text-align: center;
  }

  .result-success { background: rgba(71,255,156,0.1); border: 1px solid rgba(71,255,156,0.25); color: var(--success); }
  .result-error { background: rgba(255,94,94,0.1); border: 1px solid rgba(255,94,94,0.25); color: var(--danger); }

  .divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

  .admin-link {
    display: block;
    text-align: center;
    font-size: 0.75rem;
    color: var(--muted);
    text-decoration: none;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: color 0.2s;
  }

  .admin-link:hover { color: var(--accent); }

  .loading { opacity: 0.6; pointer-events: none; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .fade-in { animation: fadeIn 0.3s ease forwards; }

  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
  .punching { animation: pulse 0.8s infinite; }
</style>
</head>
<body>
<div class="clock-wrap">
  <div class="brand">
    <h1>⏱ Time Clock</h1>
    <div class="live-time" id="liveTime">—</div>
  </div>

  <div class="card">
    <div class="label">Enter Your Employee Code</div>
    <div class="code-input-wrap">
      <input type="text" class="code-input" id="codeInput" placeholder="• • • •" maxlength="10" autocomplete="off" />
    </div>

    <div class="employee-info" id="empInfo">
      <div class="emp-name" id="empName"></div>
      <div class="emp-status" id="empStatus"></div>
    </div>

    <button class="btn btn-lookup" id="lookupBtn" onclick="lookup()">Find Me →</button>
    <button class="btn btn-punch" id="punchBtn" onclick="punch()"></button>

    <div class="result-msg" id="resultMsg"></div>

    <hr class="divider">
    <a href="/admin" class="admin-link">Admin Dashboard</a>
  </div>
</div>

<script>
  let currentEmployee = null;
  let currentPunchType = null;

  // Live clock
  function updateClock() {
    const now = new Date();
    document.getElementById('liveTime').textContent = now.toLocaleDateString('en-US', {weekday:'long',month:'long',day:'numeric'}) + ' · ' + now.toLocaleTimeString('en-US', {hour:'2-digit',minute:'2-digit'});
  }
  updateClock();
  setInterval(updateClock, 1000);

  document.getElementById('codeInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') lookup();
  });

  document.getElementById('codeInput').addEventListener('input', () => {
    // Reset if they start typing again after a lookup
    document.getElementById('empInfo').style.display = 'none';
    document.getElementById('punchBtn').style.display = 'none';
    document.getElementById('lookupBtn').style.display = 'block';
    document.getElementById('resultMsg').style.display = 'none';
    currentEmployee = null;
  });

  async function lookup() {
    const code = document.getElementById('codeInput').value.trim();
    if (!code) return;

    const btn = document.getElementById('lookupBtn');
    btn.classList.add('loading');
    btn.textContent = 'Looking up...';

    try {
      const res = await fetch('/api/lookup', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({code})
      });
      const data = await res.json();

      if (!data.success) {
        showResult(data.message, 'error');
        btn.classList.remove('loading');
        btn.textContent = 'Find Me →';
        return;
      }

      currentEmployee = data;
      currentPunchType = data.next_punch;

      document.getElementById('empName').textContent = data.name;

      const statusLabels = {
        'not_in': 'Not clocked in yet',
        'working_morning': '🟢 Working — morning',
        'at_lunch': '🟡 Out to lunch',
        'working_afternoon': '🟢 Working — afternoon',
        'clocked_out': '⚫ Clocked out for the day'
      };

      const badgeClass = {
        'not_in': 'badge-out',
        'working_morning': 'badge-in',
        'at_lunch': 'badge-lunch',
        'working_afternoon': 'badge-in',
        'clocked_out': 'badge-done'
      };

      document.getElementById('empStatus').innerHTML = `<span class="status-badge ${badgeClass[data.status]}">${statusLabels[data.status]}</span>`;
      document.getElementById('empInfo').style.display = 'block';
      document.getElementById('empInfo').classList.add('fade-in');

      document.getElementById('resultMsg').style.display = 'none';
      btn.style.display = 'none';

      if (data.done) {
        showResult("You're all done for today! See you tomorrow 👋", 'success');
      } else {
        const punchBtn = document.getElementById('punchBtn');
        punchBtn.textContent = data.next_label + ' →';
        punchBtn.style.display = 'block';
        punchBtn.classList.add('fade-in');
      }

    } catch(e) {
      showResult('Connection error. Please try again.', 'error');
      btn.classList.remove('loading');
      btn.textContent = 'Find Me →';
    }
  }

  async function punch() {
    if (!currentEmployee || !currentPunchType) return;

    const btn = document.getElementById('punchBtn');
    btn.classList.add('punching');
    btn.textContent = 'Recording...';

    try {
      const res = await fetch('/api/punch', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({employee_id: currentEmployee.employee_id, punch_type: currentPunchType})
      });
      const data = await res.json();

      btn.style.display = 'none';
      btn.classList.remove('punching');

      if (data.success) {
        showResult('✓ ' + data.message, 'success');
        // Reset after 4 seconds
        setTimeout(resetForm, 4000);
      } else {
        showResult(data.message, 'error');
        resetForm();
      }
    } catch(e) {
      showResult('Connection error. Please try again.', 'error');
      btn.classList.remove('punching');
    }
  }

  function showResult(msg, type) {
    const el = document.getElementById('resultMsg');
    el.textContent = msg;
    el.className = `result-msg result-${type} fade-in`;
    el.style.display = 'block';
  }

  function resetForm() {
    document.getElementById('codeInput').value = '';
    document.getElementById('empInfo').style.display = 'none';
    document.getElementById('punchBtn').style.display = 'none';
    document.getElementById('lookupBtn').style.display = 'block';
    document.getElementById('lookupBtn').classList.remove('loading');
    document.getElementById('lookupBtn').textContent = 'Find Me →';
    document.getElementById('resultMsg').style.display = 'none';
    currentEmployee = null;
    currentPunchType = null;
    document.getElementById('codeInput').focus();
  }
</script>
</body>
</html>
