<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time Clock</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f4f4f6;
    --surface: #ffffff;
    --surface2: #f0f0f3;
    --border: #e0e0e6;
    --accent: #1a1a1a;
    --accent-dim: rgba(26,26,26,0.07);
    --text: #1a1a1a;
    --muted: #888;
    --danger: #d93025;
    --success: #1a7a4a;
    --warn: #b45309;
  }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 50% at 50% 0%, rgba(0,0,0,0.04) 0%, transparent 60%);
    pointer-events: none;
  }

  .clock-wrap {
    width: 100%;
    max-width: 460px;
    position: relative;
    z-index: 1;
  }

  .brand {
    text-align: center;
    margin-bottom: 36px;
  }

  .brand img {
    width: 72px;
    height: 72px;
    object-fit: contain;
    margin-bottom: 14px;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.12));
  }

  .brand h1 {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: -1px;
    color: var(--text);
  }

  .live-time {
    font-size: 0.82rem;
    color: var(--muted);
    margin-top: 6px;
    letter-spacing: 0.04em;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 36px;
    position: relative;
    box-shadow: 0 2px 16px rgba(0,0,0,0.07);
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, #1a1a1a, transparent);
    border-radius: 16px 16px 0 0;
    opacity: 0.15;
  }

  .label {
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .code-input {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 1.5rem;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.2em;
    text-align: center;
    text-transform: uppercase;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .code-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }

  .code-input::placeholder { color: #ccc; letter-spacing: 0.1em; }

  .btn {
    width: 100%;
    margin-top: 16px;
    padding: 15px;
    border-radius: 10px;
    border: none;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: all 0.15s;
  }

  .btn-lookup {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    color: var(--text);
  }
  .btn-lookup:hover { border-color: var(--accent); background: var(--accent-dim); }

  .btn-punch {
    background: var(--accent);
    color: #fff;
  }
  .btn-punch:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-punch:active { transform: translateY(0); }

  .employee-info { display: none; margin: 20px 0 4px; }

  .emp-name {
    font-family: 'Syne', sans-serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--text);
  }

  .status-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-top: 8px;
  }

  .badge-in { background: rgba(26,122,74,0.1); color: var(--success); border: 1px solid rgba(26,122,74,0.25); }
  .badge-lunch { background: rgba(180,83,9,0.1); color: var(--warn); border: 1px solid rgba(180,83,9,0.2); }
  .badge-out { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .badge-done { background: rgba(26,122,74,0.1); color: var(--success); border: 1px solid rgba(26,122,74,0.25); }

  .result-msg {
    display: none;
    margin-top: 20px;
    padding: 14px 18px;
    border-radius: 10px;
    font-size: 0.88rem;
    text-align: center;
  }
  .result-success { background: rgba(26,122,74,0.08); border: 1px solid rgba(26,122,74,0.2); color: var(--success); }
  .result-error { background: rgba(217,48,37,0.08); border: 1px solid rgba(217,48,37,0.2); color: var(--danger); }

  .divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

  .admin-link {
    display: block;
    text-align: center;
    font-size: 0.75rem;
    color: var(--muted);
    text-decoration: none;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: color 0.2s;
  }
  .admin-link:hover { color: var(--accent); }

  .loading { opacity: 0.5; pointer-events: none; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .fade-in { animation: fadeIn 0.25s ease forwards; }

  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
  .punching { animation: pulse 0.8s infinite; }
</style>
</head>

    <h1>Time Clock</h1>
    <div class="live-time" id="liveTime">—</div>
  </div>

  <div class="card">
    <div class="label">Enter Your Employee Code</div>
    <input type="text" class="code-input" id="codeInput" placeholder="• • • •" maxlength="10" autocomplete="off" />

    <button class="btn btn-punch" id="submitBtn" onclick="submit()">Submit</button>

    <div class="result-msg" id="resultMsg"></div>

    <hr class="divider">
    <a href="/admin" class="admin-link">Admin Dashboard</a>
  </div>
</div>

<script>
  function updateClock() {
    const now = new Date();
    document.getElementById('liveTime').textContent =
      now.toLocaleDateString('en-US', {weekday:'long',month:'long',day:'numeric'}) + ' · ' +
      now.toLocaleTimeString('en-US', {hour:'2-digit',minute:'2-digit'});
  }
  updateClock();
  setInterval(updateClock, 1000);

  document.getElementById('codeInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') submit();
  });

  async function submit() {
    const code = document.getElementById('codeInput').value.trim();
    if (!code) return;

    const btn = document.getElementById('submitBtn');
    btn.textContent = 'Recording...';
    btn.disabled = true;

    try {
      // Step 1: lookup
      const lookupRes = await fetch('/api/lookup', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({code})
      });
      const emp = await lookupRes.json();

      if (!emp.success) {
        showResult(emp.message, 'error');
        reset();
        return;
      }

      if (emp.done) {
        showResult("You're all done for today! See you tomorrow 👋", 'success');
        setTimeout(resetForm, 3500);
        return;
      }

      // Step 2: immediately punch
      const punchRes = await fetch('/api/punch', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({employee_id: emp.employee_id})
      });
      const result = await punchRes.json();

      if (result.success) {
        showResult('✓ ' + emp.name + ' — ' + result.message, 'success');
        setTimeout(resetForm, 3500);
      } else {
        showResult(result.message, 'error');
        setTimeout(resetForm, 3500);
      }

    } catch(e) {
      showResult('Connection error. Please try again.', 'error');
      reset();
    }
  }

  function showResult(msg, type) {
    const el = document.getElementById('resultMsg');
    el.textContent = msg;
    el.className = `result-msg result-${type} fade-in`;
    el.style.display = 'block';
  }

  function reset() {
    const btn = document.getElementById('submitBtn');
    btn.textContent = 'Submit →';
    btn.disabled = false;
  }

  function resetForm() {
    document.getElementById('codeInput').value = '';
    document.getElementById('resultMsg').style.display = 'none';
    reset();
    document.getElementById('codeInput').focus();
  }
</script>
</body>
